name: Publish to npm

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Clean legacy npm config
        run: npm config delete always-auth || true

      - name: Validate semver tag
        id: tag
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_semver=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${GITHUB_REF_NAME} is valid semver."
          else
            echo "is_semver=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${GITHUB_REF_NAME} is not strict semver, skipping publish."
          fi

      - name: Check package version and publish state
        id: publish_state
        if: steps.tag.outputs.is_semver == 'true'
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")

          if [ "${GITHUB_REF_NAME}" != "${PKG_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}."
            exit 1
          fi

          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${PKG_NAME}@${PKG_VERSION} is already published. Skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Version ${PKG_NAME}@${PKG_VERSION} is not published yet."
          fi

      - run: npm ci
        if: steps.tag.outputs.is_semver == 'true' && steps.publish_state.outputs.already_published != 'true'
      - run: npm run check
        if: steps.tag.outputs.is_semver == 'true' && steps.publish_state.outputs.already_published != 'true'
      - run: npm test
        if: steps.tag.outputs.is_semver == 'true' && steps.publish_state.outputs.already_published != 'true'
      - run: npm run build
        if: steps.tag.outputs.is_semver == 'true' && steps.publish_state.outputs.already_published != 'true'
      - name: Publish package (token then OIDC fallback)
        if: steps.tag.outputs.is_semver == 'true' && steps.publish_state.outputs.already_published != 'true'
        run: |
          publish_with_token() {
            NODE_AUTH_TOKEN="${NPM_TOKEN}" npm publish --access public
          }

          publish_with_oidc() {
            unset NODE_AUTH_TOKEN
            npm publish --provenance --access public
          }

          if [ -n "${NPM_TOKEN}" ]; then
            echo "Attempt 1/2: publishing with NPM_TOKEN"
            if publish_with_token; then
              exit 0
            fi
            echo "NPM_TOKEN publish failed, attempting OIDC fallback"
            if publish_with_oidc; then
              exit 0
            fi
            echo "Both publish methods failed."
            echo "Fix: verify NPM_TOKEN rights on @naskot and/or configure npm Trusted Publisher for this repo/workflow."
            exit 1
          fi

          echo "NPM_TOKEN missing, attempting OIDC publish"
          if publish_with_oidc; then
            exit 0
          fi
          echo "OIDC publish failed."
          echo "Fix: configure npm Trusted Publisher for @naskot/node-runtime-bootstrap or add NPM_TOKEN secret."
          exit 1
